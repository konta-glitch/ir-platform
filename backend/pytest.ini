[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
# Quiet the known Pydantic v2 class-based-config deprecation so real warnings
# stand out. (Tracked separately as a migration to ConfigDict.)
filterwarnings =
    ignore:Support for class-based `config`:DeprecationWarning
