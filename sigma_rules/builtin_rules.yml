title: PowerShell Encoded Command Execution
id: 11111111-0000-0000-0000-000000000001
status: stable
description: Detects PowerShell execution with an encoded command, commonly used to obfuscate malicious payloads.
references:
    - https://attack.mitre.org/techniques/T1059/001/
tags:
    - attack.execution
    - attack.t1059.001
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - ' -enc '
            - ' -EncodedCommand '
            - ' -e '
    condition: selection
level: high
---
title: PowerShell Download Cradle
id: 11111111-0000-0000-0000-000000000002
status: stable
description: Detects PowerShell download cradles used to fetch and execute remote payloads in memory.
tags:
    - attack.command_and_control
    - attack.t1059.001
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|contains:
            - 'Net.WebClient'
            - 'DownloadString'
            - 'DownloadFile'
            - 'DownloadData'
            - 'Invoke-WebRequest'
            - 'IEX (New-Object'
    condition: selection
level: high
---
title: LSASS Memory Dump via Comsvcs
id: 11111111-0000-0000-0000-000000000003
status: stable
description: Detects credential dumping from LSASS process memory using comsvcs.dll MiniDump.
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|contains|all:
            - 'comsvcs.dll'
            - 'MiniDump'
    condition: selection
level: critical
---
title: Suspicious Rundll32 Execution
id: 11111111-0000-0000-0000-000000000004
status: stable
description: Detects rundll32 used to execute JavaScript or remote scriptlets (Squiblydoo-style abuse).
tags:
    - attack.defense_evasion
    - attack.t1218.011
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        Image|endswith: '\rundll32.exe'
        CommandLine|contains:
            - 'javascript:'
            - 'url.dll'
            - 'mshtml'
            - 'RunHTMLApplication'
    condition: selection
level: high
---
title: Shadow Copy Deletion
id: 11111111-0000-0000-0000-000000000005
status: stable
description: Detects deletion of volume shadow copies, a common ransomware and anti-recovery technique.
tags:
    - attack.impact
    - attack.t1490
logsource:
    product: windows
    category: process_creation
detection:
    selection_vssadmin:
        CommandLine|contains|all:
            - 'vssadmin'
            - 'delete'
            - 'shadows'
    selection_wmic:
        CommandLine|contains|all:
            - 'shadowcopy'
            - 'delete'
    condition: selection_vssadmin or selection_wmic
level: critical
---
title: Windows Defender Tampering
id: 11111111-0000-0000-0000-000000000006
status: stable
description: Detects attempts to disable or weaken Windows Defender protections.
tags:
    - attack.defense_evasion
    - attack.t1562.001
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|contains:
            - 'Set-MpPreference -DisableRealtimeMonitoring'
            - 'Add-MpPreference -ExclusionPath'
            - 'Set-MpPreference -DisableBehaviorMonitoring'
            - 'Set-MpPreference -DisableIOAVProtection'
    condition: selection
level: high
---
title: Office Application Spawning Script Interpreter
id: 11111111-0000-0000-0000-000000000007
status: stable
description: Detects Office applications spawning command or script interpreters, a hallmark of malicious macros.
tags:
    - attack.execution
    - attack.t1566.001
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        ParentImage|endswith:
            - '\winword.exe'
            - '\excel.exe'
            - '\powerpnt.exe'
            - '\outlook.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
    condition: selection
level: high
---
title: Service Installation From Suspicious Location
id: 11111111-0000-0000-0000-000000000008
status: stable
description: Detects a Windows service whose binary runs from a temp or user-writable directory.
tags:
    - attack.persistence
    - attack.t1543.003
logsource:
    product: windows
    category: service_creation
detection:
    selection:
        ServiceFileName|contains:
            - '\Temp\'
            - '\AppData\'
            - '\ProgramData\'
            - '\Users\Public\'
    condition: selection
level: high
---
title: Registry Run Key Persistence From Suspicious Path
id: 11111111-0000-0000-0000-000000000009
status: stable
description: Detects a Run key value pointing to a temp or user-writable location.
tags:
    - attack.persistence
    - attack.t1547.001
logsource:
    product: windows
    category: registry_set
detection:
    selection:
        TargetObject|contains: 'CurrentVersion\Run'
        Details|contains:
            - '\Temp\'
            - '\AppData\'
            - '\Users\Public\'
            - 'powershell'
            - 'cmd.exe'
    condition: selection
level: high
---
title: Event Log Cleared
id: 11111111-0000-0000-0000-000000000010
status: stable
description: Detects clearing of the Windows Security or System event log (anti-forensics).
tags:
    - attack.defense_evasion
    - attack.t1070.001
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID:
            - 1102
            - 104
    condition: selection
level: critical
---
title: Scheduled Task Creation With Suspicious Command
id: 11111111-0000-0000-0000-00000000000b
status: stable
description: Detects scheduled task actions that launch script interpreters or encoded commands.
tags:
    - attack.persistence
    - attack.t1053.005
logsource:
    product: windows
    category: scheduled_task
detection:
    selection:
        CommandName|contains:
            - 'powershell'
            - 'cmd.exe'
            - 'wscript'
            - 'mshta'
            - 'rundll32'
            - '-enc'
    condition: selection
level: medium
---
title: PsExec Service Execution
id: 11111111-0000-0000-0000-00000000000c
status: stable
description: Detects PsExec-style lateral movement service execution.
tags:
    - attack.lateral_movement
    - attack.t1021.002
logsource:
    product: windows
    category: process_creation
detection:
    selection:
        CommandLine|contains:
            - 'psexec'
            - 'paexec'
            - '\\\\'
    selection_remote:
        CommandLine|contains:
            - '-u '
            - 'accepteula'
    condition: selection and selection_remote
level: high
