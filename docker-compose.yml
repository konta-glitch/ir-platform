services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ir-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./exports:/app/exports
      - ./images:/app/images
      - ./collections:/app/collections
      - ./sigma_rules:/app/sigma_rules
      - ./backend/yara_rules:/app/yara_rules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ir-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
