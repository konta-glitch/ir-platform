server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Forensic collections (EVTX/registry/disk artifacts) are large — allow
    # uploads up to 2GB. nginx's default is only 1MB, which rejects almost
    # every real collection with "413 Request Entity Too Large".
    client_max_body_size 2048M;

    # SPA routing — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI backend
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;  # 1h — LLM narrative pass can take 20-40min on large collections
        proxy_send_timeout 3600s;
        client_max_body_size 2048M;  # also on the proxied location
        proxy_request_buffering off;  # stream large uploads, don't buffer to disk first
    }
}
